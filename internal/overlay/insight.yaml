commands:
  # ── 告警平台内部 API ──────────────────────────────────────────────────
  # Alertmanager 回调入口，不对外暴露
  alert-hook:            { ignore: true }

  # 用不到
  get-net-flow:          { ignore: true }
  get-service-apdex:     { ignore: true }

  # ── 告警 - 告警实例 (Alerts) ──────────────────────────────────────────
  list-alerts:
    short: "List alerts (active or historical)"
    aliases: [ls-alerts]
    example: |
      # Active alerts in a cluster
      dc insight alert list-alerts --cluster-name prod-1 --severity CRITICAL
      # Alert history (resolved=true)
      dc insight alert list-alerts --resolved=true --page 1 --page-size 50 -o json
      # Filter by group / rule
      dc insight alert list-alerts --group-id <gid> --rule-name "HighCPU"
    params:
      page:      { default: "1" }
      pageSize:  { default: "20" }
      severity:
        help:    "SEVERITY_UNSPECIFIED | CRITICAL | WARNING | INFO"
      targetType:
        help:    "TARGET_TYPE_UNSPECIFIED | GLOBAL | CLUSTER | NAMESPACE | NODE | DEPLOYMENT | STATEFULSET | DAEMONSET | POD"

  get-alert:
    short: "Get a single alert by ID"
    aliases: [describe-alert]
    example: |
      dc insight alert get-alert --id <alertId>
      dc insight alert get-alert --id <alertId> --resolved=true

  count-alert:
    short: "Count alerts grouped by time/severity/target"
    example: |
      # Count CRITICAL alerts in cluster within a time range (unix seconds)
      dc insight alert count-alert \
        --cluster-name prod-1 \
        --severity CRITICAL \
        --start 1700000000 --end 1700600000 --step 60 \
        --group-by-type=true

  clean-alert-history:
    short: "Trigger cleanup of alert history (respects retention config)"
    example: |
      dc insight alert clean-alert-history

  # ── 告警 - 告警组 (Group) ─────────────────────────────────────────────
  list-groups:
    short: "List alert groups"
    aliases: [ls-groups]
    example: |
      # All alert groups
      dc insight alert list-groups
      # Filter by name (fuzzy) within a cluster + namespace
      dc insight alert list-groups --name node --cluster-name prod-1 --namespace insight-system
      # Only built-in groups, page through results
      dc insight alert list-groups --builtin=true --page 1 --page-size 50 -o json
    params:
      page:     { default: "1" }
      pageSize: { default: "20" }

  get-group:
    short: "Get an alert group by ID"
    aliases: [describe-group]
    example: |
      dc insight alert get-group --id <gid>
      dc insight alert get-group --id <gid> -o json

  create-group:
    short: "Create an alert group (with rules / receivers)"
    example: |
      echo '{
        "name": "node-health",
        "clusterName": "prod-1",
        "namespace": "insight-system",
        "description": "Node health alerts",
        "targetType": "NODE",
        "targets": ["*"],
        "receivers": [
          {"type": "email", "names": ["ops-mail"]}
        ],
        "notifyRepeatConfig": [
          {"severity": "CRITICAL", "interval": 300}
        ],
        "rules": [
          {
            "name": "NodeDown",
            "description": "node unreachable for 5m",
            "severity": "CRITICAL",
            "duration": "5m",
            "expr": "up{job=\"node-exporter\"} == 0",
            "labels": {"team": "ops"},
            "annotations": {"summary": "Node {{ $labels.instance }} down"}
          }
        ]
      }' | dc insight alert create-group --file -

  update-group:
    short: "Update an alert group (description / receivers / notify only)"
    example: |
      echo '{
        "description": "updated",
        "notificationTemplate": "default",
        "receivers": [{"type":"email","names":["ops-mail"]}],
        "notifyRepeatConfig": [{"severity":"WARNING","interval":600}]
      }' | dc insight alert update-group --id <gid> --file -

  delete-group:
    short: "Delete an alert group"
    example: |
      dc insight alert delete-group --id <gid>

  validate-group:
    short: "Validate a group definition (PrometheusRule YAML)"
    example: |
      echo '{
        "clusterName": "prod-1",
        "namespace": "insight-system",
        "yamlString": "groups:\n- name: my\n  rules:\n  - alert: A\n    expr: vector(1)\n"
      }' | dc insight alert validate-group --file -

  # ── 告警 - 告警规则 (GroupRule) ───────────────────────────────────────
  list-group-rules:
    short: "List rules under an alert group"
    aliases: [ls-group-rules]
    example: |
      # All rules in a group
      dc insight alert list-group-rules --id <gid>
      # Filter by name + severity
      dc insight alert list-group-rules --id <gid> --name HighCPU --severity CRITICAL
      # Only firing rules, paged
      dc insight alert list-group-rules --id <gid> --status FIRING --page 1 --page-size 50 -o json
    params:
      page:     { default: "1" }
      pageSize: { default: "20" }
      severity: { help: "SEVERITY_UNSPECIFIED | CRITICAL | WARNING | INFO" }
      status:   { help: "UNSPECIFIED | FIRING | ENABLED" }

  get-group-rule:
    short: "Get a single rule by group id + rule name"
    example: |
      dc insight alert get-group-rule --id <gid> --name HighCPU

  add-group-rule:
    short: "Add a rule to an existing group"
    example: |
      echo '{
        "rule": {
          "name": "HighMem",
          "severity": "WARNING",
          "duration": "5m",
          "expr": "node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes < 0.1",
          "description": "memory low",
          "labels": {"team":"ops"},
          "annotations": {"summary":"low memory on {{ $labels.instance }}"}
        }
      }' | dc insight alert add-group-rule --id <gid> --file -

  update-group-rule:
    short: "Update a rule in a group"
    example: |
      echo '{
        "severity": "CRITICAL",
        "duration": "10m",
        "expr": "rate(http_requests_total{code=~\"5..\"}[5m]) > 1",
        "description": "5xx rate too high"
      }' | dc insight alert update-group-rule --id <gid> --name HighErr --file -

  delete-group-rule:
    short: "Delete a rule from a group"
    example: |
      dc insight alert delete-group-rule --id <gid> --name HighCPU

  preview-rule:
    short: "Preview a rule's evaluation (matrix output) before saving"
    example: |
      echo '{
        "group": {"clusterName":"prod-1","targetType":"CLUSTER","targets":["*"]},
        "rule":  {"expr":"vector(1)","duration":"1m","severity":"WARNING"},
        "params":{"start":"1700000000","end":"1700001000","step":60}
      }' | dc insight alert preview-rule --file -

  # ── 告警 - 通知接收人 (Receiver) ──────────────────────────────────────
  list-receivers:
    short: "List notification receivers"
    aliases: [ls-receivers]
    example: |
      # All receivers
      dc insight alert list-receivers
      # Only email receivers, exact name match
      dc insight alert list-receivers --type email --name ops-mail --exact-search=true
      # Paged JSON output
      dc insight alert list-receivers --page 1 --page-size 50 -o json
    params:
      page:     { default: "1" }
      pageSize: { default: "20" }
      type:     { help: "RECEIVER_TYPE_UNSPECIFIED | webhook | email | dingtalk | wecom | sms | message | lark" }

  get-receiver:
    short: "Get a receiver by name"
    aliases: [describe-receiver]
    example: |
      dc insight alert get-receiver --name ops-mail
      # Disambiguate when same name exists across types
      dc insight alert get-receiver --name ops-mail --type email -o json

  create-receiver:
    short: "Create a notification receiver (email/dingtalk/wecom/webhook/lark/sms/message)"
    example: |
      # Email receiver
      echo '{
        "name": "ops-mail",
        "type": "email",
        "description": "ops mailing list",
        "email": {"to": ["ops@example.com"]}
      }' | dc insight alert create-receiver --file -

      # Webhook receiver with bearer token
      echo '{
        "name": "my-webhook",
        "type": "webhook",
        "webhook": {
          "url": "https://hooks.example.com/insight",
          "httpConfig": {
            "bearerToken": "xxx",
            "tlsConfig": {"insecureSkipVerify": false}
          }
        }
      }' | dc insight alert create-receiver --file -

  update-receiver:
    short: "Update a notification receiver"
    example: |
      echo '{
        "name": "ops-mail",
        "type": "email",
        "description": "updated mailing list",
        "email": {"to": ["ops@example.com", "oncall@example.com"]}
      }' | dc insight alert update-receiver --name ops-mail --file -

  delete-receiver:
    short: "Delete a notification receiver"
    example: |
      dc insight alert delete-receiver --name ops-mail

  test-receiver:
    short: "Send a test message to a receiver definition"
    example: |
      echo '{
        "name": "ops-mail",
        "type": "email",
        "email": {"to": ["ops@example.com"]}
      }' | dc insight alert test-receiver --file -

  get-smtp-status:
    short: "Check whether SMTP is configured (required for email receivers)"
    example: |
      dc insight alert get-smtp-status
      dc insight alert get-smtp-status -o json

  # ── 告警 - SMS Provider ───────────────────────────────────────────────
  list-providers:
    short: "List SMS providers (Aliyun / Tencent / custom)"
    example: |
      dc insight alert list-providers
      dc insight alert list-providers --name aliyun --exact-search=true
      dc insight alert list-providers --page 1 --page-size 50 -o json
    params:
      page:     { default: "1" }
      pageSize: { default: "20" }

  get-provider:
    short: "Get an SMS provider by name"
    example: |
      dc insight alert get-provider --name aliyun-sms
      dc insight alert get-provider --name aliyun-sms -o json

  create-provider:
    short: "Create an SMS provider"
    example: |
      echo '{
        "name": "aliyun-sms",
        "type": "aliyun",
        "template": "default",
        "aliyun": {
          "accessKeyId": "AKID...",
          "accessKeySecret": "SECRET...",
          "signName": "MyCompany",
          "templateCode": "SMS_123"
        }
      }' | dc insight alert create-provider --file -

  update-provider:
    short: "Update an SMS provider"
    example: |
      echo '{
        "type": "aliyun",
        "template": "default",
        "aliyun": {
          "accessKeyId": "AKID...",
          "accessKeySecret": "NEW_SECRET",
          "signName": "MyCompany",
          "templateCode": "SMS_456"
        }
      }' | dc insight alert update-provider --name aliyun-sms --file -

  delete-provider:
    short: "Delete an SMS provider"
    example: |
      dc insight alert delete-provider --name aliyun-sms

  # ── 告警 - 通知模板 (Template) ────────────────────────────────────────
  list-templates:
    short: "List notification templates"
    aliases: [ls-templates]
    example: |
      dc insight alert list-templates
      dc insight alert list-templates --name crit --exact-search=false
      dc insight alert list-templates --builtin=true --page 1 --page-size 50 -o json
    params:
      page:     { default: "1" }
      pageSize: { default: "20" }

  list-template-summary:
    short: "List notification template summaries (lightweight)"
    example: |
      dc insight alert list-template-summary
      dc insight alert list-template-summary --builtin=true -o json
    params:
      page:     { default: "1" }
      pageSize: { default: "20" }

  get-template:
    short: "Get a notification template by name"
    example: |
      dc insight alert get-template --name crit-email
      dc insight alert get-template --name crit-email -o json

  create-template:
    short: "Create a notification template (body per channel)"
    example: |
      echo '{
        "name": "crit-email",
        "description": "critical alert template",
        "body": {
          "email": {
            "subject": "[CRITICAL] {{ .CommonLabels.alertname }}",
            "body": "{{ range .Alerts }}{{ .Annotations.summary }}\n{{ end }}"
          },
          "dingtalk": "**[CRITICAL]** {{ .CommonLabels.alertname }}",
          "wecom": "[CRITICAL] {{ .CommonLabels.alertname }}"
        }
      }' | dc insight alert create-template --file -

  update-template:
    short: "Update a notification template"
    example: |
      echo '{
        "description": "updated critical template",
        "body": {
          "email": {
            "subject": "[CRITICAL] {{ .CommonLabels.alertname }}",
            "body":    "{{ range .Alerts }}{{ .Annotations.summary }}\n{{ end }}"
          }
        }
      }' | dc insight alert update-template --name crit-email --file -

  delete-template:
    short: "Delete a notification template"
    example: |
      dc insight alert delete-template --name crit-email

  preview-template:
    short: "Render a notification template against sample alert data"
    example: |
      echo '{
        "body": {"email":{"subject":"[T] {{ .CommonLabels.alertname }}","body":"x"}},
        "data": {
          "status": "firing",
          "commonLabels": {"alertname":"HighCPU"},
          "alerts": [{"status":"firing","labels":{"instance":"node1"},"annotations":{"summary":"cpu hot"}}]
        }
      }' | dc insight alert preview-template --file -

  # ── 告警 - 规则模板 (RuleTemplate) ────────────────────────────────────
  list-rule-templates:
    short: "List alert rule templates (reusable rule bundles)"
    example: |
      dc insight alert list-rule-templates
      dc insight alert list-rule-templates --target-type NODE --builtin=false
      dc insight alert list-rule-templates --name node --page 1 --page-size 50 -o json
    params:
      page:     { default: "1" }
      pageSize: { default: "20" }
      targetType:
        help: "TARGET_TYPE_UNSPECIFIED | GLOBAL | CLUSTER | NAMESPACE | NODE | DEPLOYMENT | STATEFULSET | DAEMONSET | POD"

  list-rule-template-summary:
    short: "List rule template summaries (id/name/targetType only)"
    example: |
      dc insight alert list-rule-template-summary
      dc insight alert list-rule-template-summary --target-type CLUSTER -o json

  get-rule-template:
    short: "Get a rule template by ID"
    example: |
      dc insight alert get-rule-template --id <rtid>
      dc insight alert get-rule-template --id <rtid> -o json

  create-rule-template:
    short: "Create a rule template (bundle of rules)"
    example: |
      echo '{
        "name": "node-basics",
        "description": "basic node alerts",
        "targetType": "NODE",
        "rules": [
          {"name":"NodeDown","severity":"CRITICAL","duration":"5m","expr":"up == 0"},
          {"name":"NodeHighLoad","severity":"WARNING","duration":"10m","expr":"node_load5 > 8"}
        ]
      }' | dc insight alert create-rule-template --file -

  update-rule-template:
    short: "Update a rule template"
    example: |
      echo '{
        "description": "updated node basics",
        "rules": [
          {"name":"NodeDown","severity":"CRITICAL","duration":"10m","expr":"up == 0"},
          {"name":"NodeHighLoad","severity":"WARNING","duration":"15m","expr":"node_load5 > 10"}
        ]
      }' | dc insight alert update-rule-template --id <rtid> --file -

  delete-rule-template:
    short: "Delete a rule template"
    example: |
      dc insight alert delete-rule-template --id <rtid>

  # ── 告警 - 静默 (Silence) ─────────────────────────────────────────────
  list-silences:
    short: "List alert silences"
    aliases: [ls-silences]
    example: |
      # All silences (active and expired)
      dc insight alert list-silences
      # Only currently-active silences
      dc insight alert list-silences --expired=false
      # Filter by cluster + namespace
      dc insight alert list-silences --cluster-name prod-1 --namespace insight-system -o json

  get-silence:
    short: "Get a silence by ID"
    example: |
      dc insight alert get-silence --id <sid>
      dc insight alert get-silence --id <sid> -o json

  create-silence:
    short: "Create an alert silence (label matchers + optional schedule)"
    example: |
      echo '{
        "name": "maint-window",
        "clusterName": "prod-1",
        "namespace": "insight-system",
        "description": "weekly maintenance",
        "matches": [
          {"type": "=",  "key": "alertname", "value": "HighCPU"},
          {"type": "=~", "key": "instance",  "value": "node-.*"}
        ],
        "activeTimeInterval": {
          "weekdayRange": [0],
          "timeRanges": [{"start":"02:00","end":"04:00"}]
        }
      }' | dc insight alert create-silence --file -

  update-silence:
    short: "Update an alert silence"
    example: |
      echo '{
        "description": "extended maintenance window",
        "matches": [
          {"type": "=",  "key": "alertname", "value": "HighCPU"},
          {"type": "=~", "key": "instance",  "value": "node-.*"}
        ],
        "activeTimeInterval": {
          "weekdayRange": [0, 6],
          "timeRanges": [{"start":"01:00","end":"05:00"}]
        }
      }' | dc insight alert update-silence --id <sid> --file -

  delete-silence:
    short: "Delete an alert silence"
    example: |
      dc insight alert delete-silence --id <sid>

  preview-silence:
    short: "Preview which alerts a silence definition would match"
    example: |
      echo '{
        "clusterName": "prod-1",
        "namespace": "insight-system",
        "size": "20",
        "matches": [{"type":"=","key":"alertname","value":"HighCPU"}]
      }' | dc insight alert preview-silence --file -

  # ── 告警 - 抑制 (Inhibition) ──────────────────────────────────────────
  list-inhibitions:
    short: "List inhibition rules"
    aliases: [ls-inhibitions]
    example: |
      dc insight alert list-inhibitions
      dc insight alert list-inhibitions --cluster-name prod-1 --namespace insight-system
      dc insight alert list-inhibitions --name cluster-down --page 1 --page-size 50 -o json
    params:
      page:     { default: "1" }
      pageSize: { default: "20" }

  get-inhibition:
    short: "Get an inhibition by ID"
    example: |
      dc insight alert get-inhibition --id <iid>
      dc insight alert get-inhibition --id <iid> -o json

  create-inhibition:
    short: "Create an inhibition rule (source matchers suppress target matchers)"
    example: |
      echo '{
        "name": "cluster-down-suppresses-node",
        "clusterName": "prod-1",
        "namespace": "insight-system",
        "description": "if cluster is down, suppress node-level alerts",
        "equal": ["clusterName"],
        "sourceMatchers": [{"type":"=","key":"alertname","value":"ClusterDown"}],
        "targetMatchers": [{"type":"=","key":"severity","value":"WARNING"}]
      }' | dc insight alert create-inhibition --file -

  update-inhibition:
    short: "Update an inhibition rule"
    example: |
      echo '{
        "description": "updated suppression",
        "equal": ["clusterName", "namespace"],
        "sourceMatchers": [{"type":"=","key":"alertname","value":"ClusterDown"}],
        "targetMatchers": [{"type":"=~","key":"severity","value":"WARNING|INFO"}]
      }' | dc insight alert update-inhibition --id <iid> --file -

  delete-inhibition:
    short: "Delete an inhibition rule"
    example: |
      dc insight alert delete-inhibition --id <iid>

  # ── 日志 (Log) ────────────────────────────────────────────────────────
  # 三种日志类型：resource (容器/工作负载) / event (K8s 事件) / system (节点系统日志)
  # 时间字段 startTime / endTime 为 unix 毫秒字符串 (e.g. "1700000000000")
  query-log:
    short: "Query logs (resource / event / system) with filters and pagination"
    example: |
      # Resource (container) logs in a cluster + namespace
      echo '{
        "startTime": "1700000000000",
        "endTime":   "1700003600000",
        "page": 1,
        "pageSize": 100,
        "sorts": ["timestamp:desc"],
        "resource": {
          "clusterFilter":   ["prod-1"],
          "namespaceFilter": ["default"],
          "workloadFilter":  ["my-app"],
          "podSearch":       ["my-app-"],
          "logSearch":       ["error"],
          "luceneFilter":    "level:ERROR AND NOT path:\"/health\""
        }
      }' | dc insight log query-log --file -

      # System (node) logs
      echo '{
        "startTime": "1700000000000",
        "endTime":   "1700003600000",
        "system": {
          "clusterFilter": ["prod-1"],
          "nodeFilter":    ["node-1"],
          "fileFilter":    ["/var/log/syslog"],
          "logSearch":     ["oom"]
        }
      }' | dc insight log query-log --file -

      # K8s event logs
      echo '{
        "startTime": "1700000000000",
        "endTime":   "1700003600000",
        "event": {
          "clusterFilter": ["prod-1"],
          "logSearch":     ["FailedScheduling"]
        }
      }' | dc insight log query-log --file -

  query-log-context:
    short: "Fetch surrounding log lines around a specific timestamp (context view)"
    example: |
      # Get 50 lines before and 50 lines after a specific resource log entry
      echo '{
        "before": 50,
        "after":  50,
        "startTime":     "1700000000000",
        "endTime":       "1700003600000",
        "nanotimestamp": "1700001234567890000",
        "type": "resource",
        "resource": {
          "cluster":   "prod-1",
          "namespace": "default",
          "pod":       "my-app-abc123",
          "container": "app"
        }
      }' | dc insight log query-log-context --file -

      # Context around a system log on a node
      echo '{
        "before": 30, "after": 30,
        "startTime": "1700000000000", "endTime": "1700003600000",
        "nanotimestamp": "1700001234567890000",
        "type": "system",
        "system": {"cluster":"prod-1","node":"node-1","file":"/var/log/syslog"}
      }' | dc insight log query-log-context --file -

  query-log-histogram:
    short: "Bucket log counts over time (histogram) for a query"
    example: |
      # 1-minute buckets of error logs across a namespace
      echo '{
        "startTime": "1700000000000",
        "endTime":   "1700003600000",
        "interval":  "1m",
        "resource": {
          "clusterFilter":   ["prod-1"],
          "namespaceFilter": ["default"],
          "logSearch":       ["error"]
        }
      }' | dc insight log query-log-histogram --file -

  search-log:
    short: "Search logs by Elasticsearch index + ES DSL query"
    example: |
      # --query must be a valid Elasticsearch DSL JSON body (passed as a query-string value).
      # Match a single field:
      dc insight log search-log \
        --index insight-log \
        --query '{"query":{"match":{"log":"timeout"}}}'

      # Bool query with filters + size/sort, against a namespace:
      dc insight log search-log \
        --index insight-log \
        --query '{
          "size": 100,
          "sort": [{"@timestamp":"desc"}],
          "query": {
            "bool": {
              "must":   [{"match": {"log": "error"}}],
              "filter": [
                {"term":  {"kubernetes.namespace_name": "default"}},
                {"range": {"@timestamp": {"gte": "now-1h", "lte": "now"}}}
              ]
            }
          }
        }' -o json

  list-log-file-paths:
    short: "List available system log file paths on a node"
    aliases: [ls-log-file-paths]
    example: |
      # Files on a specific node
      dc insight log list-log-file-paths --cluster-name prod-1 --node node-1
      dc insight log list-log-file-paths --cluster prod-1 --node node-1 -o json

  download-log:
    short: "Export logs (or a context window) to a downloadable file"
    example: |
      # Export up to 100k resource log lines as a file (response contains download info)
      echo '{
        "maxLines": 100000,
        "fields":   ["timestamp", "log", "kubernetes.pod_name", "kubernetes.container_name"],
        "queryLog": {
          "startTime": "1700000000000",
          "endTime":   "1700003600000",
          "sorts":     ["timestamp:asc"],
          "resource": {
            "clusterFilter":   ["prod-1"],
            "namespaceFilter": ["default"],
            "workloadFilter":  ["my-app"]
          }
        }
      }' | dc insight log download-log --file -

      # Export a context window around one log line
      echo '{
        "maxLines": 200,
        "fields":   ["timestamp", "log"],
        "queryLogContext": {
          "before": 100, "after": 100,
          "startTime": "1700000000000", "endTime": "1700003600000",
          "nanotimestamp": "1700001234567890000",
          "type": "resource",
          "resource": {"cluster":"prod-1","namespace":"default","pod":"my-app-abc","container":"app"}
        }
      }' | dc insight log download-log --file -

  # ── 指标 (Metric) ─────────────────────────────────────────────────────
  # 透传 Prometheus 查询 API，time/start/end 单位为秒 (unix int64)
  query-metric:
    short: "Run a PromQL instant query (Prometheus /api/v1/query)"
    example: |
      # Current up-status of all targets in a cluster
      dc insight metric query-metric \
        --cluster-name prod-1 \
        --query 'up'

      # Per-pod CPU usage in a namespace at a specific timestamp (unix seconds)
      dc insight metric query-metric \
        --cluster-name prod-1 \
        --namespace default \
        --query 'sum(rate(container_cpu_usage_seconds_total{namespace="default"}[5m])) by (pod)' \
        --time 1700000000 -o json

  query-range-metric:
    short: "Run a PromQL range query (Prometheus /api/v1/query_range)"
    example: |
      # 1-hour CPU usage range, 30s step
      dc insight metric query-range-metric \
        --cluster-name prod-1 \
        --query 'sum(rate(container_cpu_usage_seconds_total[5m])) by (pod)' \
        --start 1700000000 --end 1700003600 --step 30 -o json

      # Node memory utilization for a single node
      dc insight metric query-range-metric \
        --cluster-name prod-1 \
        --query 'node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes' \
        --start 1700000000 --end 1700003600 --step 60

  batch-query-metric:
    short: "Run multiple PromQL instant queries in one call (shared label match)"
    example: |
      # Instant snapshot of several SLO metrics, scoped to a cluster + namespace
      echo '{
        "matchLabel": {
          "clusterName": "prod-1",
          "namespace":   "default",
          "extraLabel":  {"app": "my-app"}
        },
        "param": {"time": "1700000000"},
        "queryList": [
          "sum(rate(http_requests_total[5m]))",
          "sum(rate(http_requests_total{code=~\"5..\"}[5m]))",
          "histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket[5m])) by (le))"
        ]
      }' | dc insight metric batch-query-metric --file -

  batch-query-range-metric:
    short: "Run multiple PromQL range queries in one call (shared label match)"
    example: |
      # 1-hour range of QPS, error rate, p99 latency in a single call
      echo '{
        "matchLabel": {
          "clusterName": "prod-1",
          "namespace":   "default",
          "extraLabel":  {"app": "my-app"}
        },
        "param": {"start": "1700000000", "end": "1700003600", "step": 30},
        "queryList": [
          "sum(rate(http_requests_total[5m]))",
          "sum(rate(http_requests_total{code=~\"5..\"}[5m])) / sum(rate(http_requests_total[5m]))",
          "histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket[5m])) by (le))"
        ]
      }' | dc insight metric batch-query-range-metric --file -

  format-query:
    short: "Pretty-print / normalize a PromQL expression (server-side formatter)"
    example: |
      echo '{"query":"sum(rate(http_requests_total{code=~\"5..\"}[5m]))/sum(rate(http_requests_total[5m]))"}' \
        | dc insight metric format-query --file -

  # ── 资源 (Resource) ───────────────────────────────────────────────────
  # 集群 (Cluster)
  list-clusters:
    short: "List all clusters known to Insight"
    aliases: [ls-clusters]
    example: |
      dc insight resource list-clusters
      # Include clusters that have not enabled monitoring
      dc insight resource list-clusters --show-all-cluster=true -o json

  list-cluster-summary:
    short: "List clusters with status/version/role summary"
    example: |
      dc insight resource list-cluster-summary
      dc insight resource list-cluster-summary --phase RUNNING --version v1.28 \
        --page 1 --page-size 50 -o json
    params:
      page:     { default: "1" }
      pageSize: { default: "20" }
      phase:    { help: "CLUSTER_PHASE_UNSPECIFIED | UNKNOWN | CREATING | RUNNING | UPDATING | DELETING | FAILED" }

  get-cluster:
    short: "Get cluster details by name"
    aliases: [describe-cluster]
    example: |
      dc insight resource get-cluster --name prod-1
      dc insight resource get-cluster --name prod-1 -o json

  get-agent-summary:
    short: "Get the insight-agent component summary for a cluster"
    example: |
      dc insight resource get-agent-summary --cluster prod-1
      dc insight resource get-agent-summary --cluster prod-1 -o json

  get-server-component-summary:
    short: "Get insight-server-side component status summary"
    example: |
      dc insight resource get-server-component-summary
      dc insight resource get-server-component-summary -o json

  # 命名空间 (Namespace)
  list-namespaces:
    short: "List namespaces in a cluster"
    aliases: [ls-namespaces]
    example: |
      dc insight resource list-namespaces --cluster prod-1
      dc insight resource list-namespaces --cluster prod-1 -o json

  get-namespace:
    short: "Get a namespace by cluster + name"
    example: |
      dc insight resource get-namespace --cluster prod-1 --name kube-system

  # 节点 (Node)
  list-nodes:
    short: "List nodes in a cluster"
    aliases: [ls-nodes]
    example: |
      dc insight resource list-nodes --cluster prod-1
      dc insight resource list-nodes --cluster prod-1 --phase NODE_PHASE_NOT_READY -o json
      dc insight resource list-nodes --cluster prod-1 --name node- --page 1 --page-size 50
    params:
      page:     { default: "1" }
      pageSize: { default: "20" }
      phase:    { help: "NODE_PHASE_UNSPECIFIED | NODE_PHASE_READY | NODE_PHASE_NOT_READY | NODE_PHASE_UNKNOWN" }

  get-node:
    short: "Get node details by cluster + name"
    aliases: [describe-node]
    example: |
      dc insight resource get-node --cluster prod-1 --name node-1
      dc insight resource get-node --cluster prod-1 --name node-1 -o json

  get-node-gpu-dashboards:
    short: "Get GPU dashboard URLs for a node"
    example: |
      dc insight resource get-node-gpu-dashboards --cluster prod-1 --name node-1
      dc insight resource get-node-gpu-dashboards --cluster prod-1 --name node-1 -o json

  # Pod
  list-pods:
    short: "List pods in a cluster"
    aliases: [ls-pods]
    example: |
      dc insight resource list-pods --cluster prod-1
      dc insight resource list-pods --cluster prod-1 --namespace default --phase POD_PHASE_RUNNING
      dc insight resource list-pods --cluster prod-1 --name my-app --page 1 --page-size 50 -o json
    params:
      page:     { default: "1" }
      pageSize: { default: "20" }
      phase:    { help: "POD_PHASE_UNSPECIFIED | POD_PHASE_UNKNOWN | POD_PHASE_PENDING | POD_PHASE_RUNNING | POD_PHASE_SUCCEED | POD_PHASE_FAILED" }

  get-pod:
    short: "Get pod details by cluster + namespace + name"
    aliases: [describe-pod]
    example: |
      dc insight resource get-pod --cluster prod-1 --namespace default --name my-app-abc123
      dc insight resource get-pod --cluster prod-1 --namespace default --name my-app-abc123 -o json

  get-pod-metrics:
    short: "Get pod metrics over a time range (CPU / memory / network)"
    example: |
      # Last hour of pod metrics, 30s step
      dc insight resource get-pod-metrics \
        --cluster prod-1 --namespace default --name my-app-abc123 \
        --start 1700000000 --end 1700003600 --step 30
      # With a specific metric list (PromQL-like keys, server-defined)
      dc insight resource get-pod-metrics \
        --cluster prod-1 --namespace default --name my-app-abc123 \
        --start 1700000000 --end 1700003600 --step 30 \
        --query-list cpuUsage --query-list memoryUsage -o json

  get-pod-gpu-dashboards:
    short: "Get GPU dashboard URLs for a pod"
    example: |
      dc insight resource get-pod-gpu-dashboards \
        --cluster prod-1 --namespace default --name my-gpu-pod

  get-pod-jvm-dashboards:
    short: "Get JVM dashboard URLs for a pod (Java workloads)"
    example: |
      dc insight resource get-pod-jvm-dashboards \
        --cluster prod-1 --namespace default --name my-java-pod \
        --start 1700000000 --end 1700003600 --step 30

  list-pod-containers:
    short: "List containers within a pod"
    aliases: [ls-pod-containers]
    example: |
      dc insight resource list-pod-containers \
        --cluster prod-1 --namespace default --name my-app-abc123
      dc insight resource list-pod-containers \
        --cluster prod-1 --namespace default --name my-app-abc123 \
        --page 1 --page-size 50 -o json
    params:
      page:     { default: "1" }
      pageSize: { default: "20" }

  # 工作负载 - Deployment
  list-deployments:
    short: "List Deployments in a cluster"
    aliases: [ls-deployments]
    example: |
      dc insight resource list-deployments --cluster prod-1
      dc insight resource list-deployments --cluster prod-1 --namespace default \
        --phase WORKLOAD_STATE_NOT_READY -o json
    params:
      page:     { default: "1" }
      pageSize: { default: "20" }
      phase:    { help: "WORKLOAD_STATE_UNKNOWN | WORKLOAD_STATE_RUNNING | WORKLOAD_STATE_DELETING | WORKLOAD_STATE_NOT_READY | WORKLOAD_STATE_STOPPED | WORKLOAD_STATE_WAITING" }

  get-deployment:
    short: "Get a Deployment by cluster + namespace + name"
    aliases: [describe-deployment]
    example: |
      dc insight resource get-deployment --cluster prod-1 --namespace default --name my-app

  get-deployment-pods:
    short: "List pods belonging to a Deployment"
    example: |
      dc insight resource get-deployment-pods \
        --cluster prod-1 --namespace default --name my-app
      dc insight resource get-deployment-pods \
        --cluster prod-1 --namespace default --name my-app \
        --pod my-app-abc --page 1 --page-size 50 -o json
    params:
      page:     { default: "1" }
      pageSize: { default: "20" }

  # 工作负载 - StatefulSet
  list-statefulsets:
    short: "List StatefulSets in a cluster"
    aliases: [ls-statefulsets]
    example: |
      dc insight resource list-statefulsets --cluster prod-1
      dc insight resource list-statefulsets --cluster prod-1 --namespace default \
        --phase WORKLOAD_STATE_RUNNING -o json
    params:
      page:     { default: "1" }
      pageSize: { default: "20" }
      phase:    { help: "WORKLOAD_STATE_UNKNOWN | WORKLOAD_STATE_RUNNING | WORKLOAD_STATE_DELETING | WORKLOAD_STATE_NOT_READY | WORKLOAD_STATE_STOPPED | WORKLOAD_STATE_WAITING" }

  get-statefulset:
    short: "Get a StatefulSet by cluster + namespace + name"
    aliases: [describe-statefulset]
    example: |
      dc insight resource get-statefulset --cluster prod-1 --namespace default --name my-db

  get-statefulset-pods:
    short: "List pods belonging to a StatefulSet"
    example: |
      dc insight resource get-statefulset-pods \
        --cluster prod-1 --namespace default --name my-db \
        --page 1 --page-size 50 -o json
    params:
      page:     { default: "1" }
      pageSize: { default: "20" }

  # 工作负载 - DaemonSet
  list-daemonsets:
    short: "List DaemonSets in a cluster"
    aliases: [ls-daemonsets]
    example: |
      dc insight resource list-daemonsets --cluster prod-1
      dc insight resource list-daemonsets --cluster prod-1 --namespace kube-system \
        --phase WORKLOAD_STATE_NOT_READY -o json
    params:
      page:     { default: "1" }
      pageSize: { default: "20" }
      phase:    { help: "WORKLOAD_STATE_UNKNOWN | WORKLOAD_STATE_RUNNING | WORKLOAD_STATE_DELETING | WORKLOAD_STATE_NOT_READY | WORKLOAD_STATE_STOPPED | WORKLOAD_STATE_WAITING" }

  get-daemonset:
    short: "Get a DaemonSet by cluster + namespace + name"
    aliases: [describe-daemonset]
    example: |
      dc insight resource get-daemonset --cluster prod-1 --namespace kube-system --name fluent-bit

  get-daemonset-pods:
    short: "List pods belonging to a DaemonSet"
    example: |
      dc insight resource get-daemonset-pods \
        --cluster prod-1 --namespace kube-system --name fluent-bit \
        --page 1 --page-size 50 -o json
    params:
      page:     { default: "1" }
      pageSize: { default: "20" }

  # 工作负载 - Job / CronJob
  list-jobs:
    short: "List Jobs in a cluster"
    aliases: [ls-jobs]
    example: |
      dc insight resource list-jobs --cluster prod-1
      dc insight resource list-jobs --cluster prod-1 --namespace default \
        --phase JOB_STATE_FAILED -o json
    params:
      page:     { default: "1" }
      pageSize: { default: "20" }
      phase:    { help: "JOB_STATE_UNSPECIFIED | JOB_STATE_WAITING | JOB_STATE_RUNNING | JOB_STATE_COMPLETED | JOB_STATE_DELETING | JOB_STATE_FAILED" }

  get-job:
    short: "Get a Job by cluster + namespace + name"
    aliases: [describe-job]
    example: |
      dc insight resource get-job --cluster prod-1 --namespace default --name backup-20240101

  get-job-pods:
    short: "List pods belonging to a Job"
    example: |
      dc insight resource get-job-pods \
        --cluster prod-1 --namespace default --name backup-20240101 \
        --page 1 --page-size 50 -o json
    params:
      page:     { default: "1" }
      pageSize: { default: "20" }

  list-cronjobs:
    short: "List CronJobs in a cluster"
    aliases: [ls-cronjobs]
    example: |
      dc insight resource list-cronjobs --cluster prod-1
      dc insight resource list-cronjobs --cluster prod-1 --namespace default \
        --phase JOB_STATE_RUNNING -o json
    params:
      page:     { default: "1" }
      pageSize: { default: "20" }
      phase:    { help: "JOB_STATE_UNSPECIFIED | JOB_STATE_WAITING | JOB_STATE_RUNNING | JOB_STATE_COMPLETED | JOB_STATE_DELETING | JOB_STATE_FAILED" }

  get-cronjob:
    short: "Get a CronJob by cluster + namespace + name"
    aliases: [describe-cronjob]
    example: |
      dc insight resource get-cronjob --cluster prod-1 --namespace default --name nightly-backup

  get-cronjob-pods:
    short: "List pods spawned by a CronJob"
    example: |
      dc insight resource get-cronjob-pods \
        --cluster prod-1 --namespace default --name nightly-backup \
        --page 1 --page-size 50 -o json
    params:
      page:     { default: "1" }
      pageSize: { default: "20" }

  # Service
  list-services:
    short: "List Services in a cluster"
    aliases: [ls-services]
    example: |
      dc insight resource list-services --cluster prod-1
      dc insight resource list-services --cluster prod-1 --namespace default --name my-app -o json
    params:
      page:     { default: "1" }
      pageSize: { default: "20" }

  get-service:
    short: "Get a Service (with linked workloads) by cluster + namespace + name"
    aliases: [describe-service]
    example: |
      dc insight resource get-service --cluster prod-1 --namespace default --name my-app

  # ── 链路追踪 (Tracing) ────────────────────────────────────────────────
  # 时间格式因接口而异：
  #   - Jaeger / Tag / SlowSQL 系列：start / end 用 RFC3339 字符串，例如 "2024-06-24T08:00:47.850Z"
  #   - APM 指标系列 (service / operation detail)：endTime / lookback / step 用 unix 微秒 (int64)
  #   - POST body 中的 startTime / endTime 通常是 unix 毫秒字符串

  # ── 链路 (Traces / Jaeger) ────────────────────────────────────────────
  find-jaeger-traces:
    short: "Search Jaeger traces by service / operation / duration window"
    aliases: [ls-traces]
    example: |
      # All traces of a service in the last hour
      dc insight tracing find-jaeger-traces \
        --cluster-name prod-1 --namespace default \
        --service-name my-app \
        --start 2024-06-24T07:00:00Z --end 2024-06-24T08:00:00Z \
        --limit 50
      # Slow traces (>500ms) for a specific operation
      dc insight tracing find-jaeger-traces \
        --cluster-name prod-1 --namespace default \
        --service-name my-app --operation-name 'GET /api/v1/orders' \
        --duration-min 500ms --duration-max 5s \
        --start 2024-06-24T07:00:00Z --end 2024-06-24T08:00:00Z -o json

  find-jaeger-trace:
    short: "Get a single Jaeger trace by trace ID"
    aliases: [describe-trace]
    example: |
      dc insight tracing find-jaeger-trace --trace-id <traceId> \
        --cluster-name prod-1 --namespace default
      dc insight tracing find-jaeger-trace --trace-id <traceId> \
        --cluster-name prod-1 --namespace default -o json

  query-spans:
    short: "Query spans with rich filters (tags, error-only, sort, pagination)"
    example: |
      # Error spans for a service in a time range, sorted by duration desc
      echo '{
        "clusterName": "prod-1",
        "namespace":   "default",
        "serviceName": ["my-app"],
        "operationName": ["GET /api/v1/orders"],
        "start": "1700000000000",
        "end":   "1700003600000",
        "durationMin":   "200ms",
        "onlyErrorSpans": true,
        "sort":     "duration:desc",
        "page":     1,
        "pageSize": 50,
        "tags": [
          {"key":"http.status_code","operation":"=","value":"500"}
        ]
      }' | dc insight tracing query-spans --file -

  query-span-histogram:
    short: "Bucket span counts over time (normal / error / total)"
    example: |
      echo '{
        "clusterName": "prod-1",
        "namespace":   "default",
        "serviceName": ["my-app"],
        "start": "1700000000000",
        "end":   "1700003600000",
        "interval": "1m",
        "onlyErrorSpans": false
      }' | dc insight tracing query-span-histogram --file -

  query-operations:
    short: "List operations (endpoints) for a service in a cluster"
    example: |
      dc insight tracing query-operations \
        --cluster-name prod-1 --namespace default --service-name my-app \
        --start 2024-06-24T07:00:00Z --end 2024-06-24T08:00:00Z --max-size 200

  list-service-names:
    short: "List service names known to the tracing backend"
    aliases: [ls-service-names]
    example: |
      dc insight tracing list-service-names --cluster-name prod-1 --namespace default
      dc insight tracing list-service-names --cluster-name prod-1 --namespace default \
        --start 2024-06-24T07:00:00Z --end 2024-06-24T08:00:00Z --max-size 500 -o json

  get-tags:
    short: "List span tag keys discovered for a service / namespace"
    example: |
      dc insight tracing get-tags --cluster prod-1 --namespace default \
        --service-names my-app --limit 500 \
        --start 2024-06-24T07:00:00Z --end 2024-06-24T08:00:00Z

  get-tag-values:
    short: "List values seen for a given tag key"
    example: |
      dc insight tracing get-tag-values --name http.status_code \
        --cluster prod-1 --namespace default --service-names my-app \
        --search 5 --limit 100 \
        --start 2024-06-24T07:00:00Z --end 2024-06-24T08:00:00Z

  # ── APM 指标 (Services / Operations) ──────────────────────────────────
  # endTime/lookback/step 单位为微秒 (int64)
  get-services:
    short: "List APM services with rate / latency / error metrics"
    aliases: [ls-services-apm]
    example: |
      # Top services by request rate in the last 30m (lookback = 30*60*1e6 us)
      dc insight tracing get-services \
        --cluster-name prod-1 --namespace default \
        --end-time 1700003600000000 --lookback 1800000000 \
        --span-kinds SPAN_KIND_SERVER --sort 'reqRate:desc' \
        --page 1 --page-size 50 -o json
    params:
      page:     { default: "1" }
      pageSize: { default: "20" }

  get-service-detail:
    short: "Get per-service APM metrics (latency / errors / requests, optionally grouped by operation)"
    example: |
      dc insight tracing get-service-detail \
        --cluster-name prod-1 --namespace default \
        --service-names my-app --group-by-operation=true \
        --end-time 1700003600000000 --lookback 1800000000 \
        --step 60000000 --rate-per 60000000 \
        --span-kinds SPAN_KIND_SERVER -o json

  get-service-pods:
    short: "List the pods backing a tracing service with per-pod request share"
    example: |
      dc insight tracing get-service-pods --name my-app \
        --cluster-name prod-1 --namespace default \
        --end-time 1700003600000000 --lookback 1800000000 \
        --sort 'reqPercentage:desc' --page 1 --page-size 50 -o json
    params:
      page:     { default: "1" }
      pageSize: { default: "20" }

  get-operation-detail:
    short: "Get per-operation APM metrics for a service"
    example: |
      dc insight tracing get-operation-detail \
        --cluster-name prod-1 --namespace default --service-name my-app \
        --end-time 1700003600000000 --lookback 1800000000 \
        --step 60000000 --rate-per 60000000 \
        --span-kinds SPAN_KIND_SERVER \
        --sort 'p99:desc' --page 1 --page-size 50 -o json
    params:
      page:     { default: "1" }
      pageSize: { default: "20" }

  # ── 慢 SQL (Slow SQL) ─────────────────────────────────────────────────
  query-metadata:
    short: "List slow-SQL metadata (DB address / system / statement) for a cluster"
    example: |
      # All SQL statements seen in the last hour for a namespace
      echo '{
        "namespace": "default",
        "startTime": "1700000000000",
        "endTime":   "1700003600000",
        "limit": 100,
        "clauses": [
          {"field":"db.system","operation":"=","stringValue":"mysql"}
        ]
      }' | dc insight tracing query-metadata --cluster-name prod-1 --type SQL_STATEMENT --file -

      # type must be one of: DATABASE_ADDRESS | DATABASE_SYSTEM | SQL_STATEMENT
      echo '{
        "namespace":"default",
        "startTime":"1700000000000","endTime":"1700003600000","limit":50
      }' | dc insight tracing query-metadata --cluster-name prod-1 --type DATABASE_ADDRESS --file -

  statement-histogram:
    short: "Histogram of SQL statement durations (cluster scoped, slow-SQL)"
    example: |
      echo '{
        "namespace": "default",
        "startTime": "1700000000000",
        "endTime":   "1700003600000",
        "interval":  "1m",
        "topN":      "10",
        "sort":      "duration:desc",
        "clauses": [
          {"field":"db.system","operation":"=","stringValue":"mysql"}
        ]
      }' | dc insight tracing statement-histogram --cluster-name prod-1 --file -

  statement-top-k:
    short: "Top-K slowest SQL statements aggregated by source service"
    example: |
      echo '{
        "namespace": "default",
        "startTime": "1700000000000",
        "endTime":   "1700003600000",
        "interval":  "5m",
        "topN":      "20",
        "sort":      "avgDuration:desc"
      }' | dc insight tracing statement-top-k --cluster-name prod-1 --file -

  get-slow-sql-spans:
    short: "List individual slow-SQL spans (drill-down from statement-top-k)"
    example: |
      echo '{
        "namespace": "default",
        "startTime": "1700000000000",
        "endTime":   "1700003600000",
        "sort":      "duration:desc",
        "page":      1,
        "pageSize":  50,
        "clauses": [
          {"field":"db.statement","operation":"contains","stringValue":"SELECT"},
          {"field":"duration","operation":">","floatValue":1000}
        ]
      }' | dc insight tracing get-slow-sql-spans --cluster-name prod-1 --file -

  # ── 服务拓扑 (ServiceGraph) ───────────────────────────────────────────
  # start/end/endTime/lookback/step/ratePer 单位为 unix 毫秒 (int64)
  get-graph:
    short: "Get service / workload / namespace topology graph"
    example: |
      # Service-level graph for a namespace in the last hour
      echo '{
        "clusterNames": ["prod-1"],
        "namespaces":   ["default"],
        "start": "1700000000000",
        "end":   "1700003600000",
        "graphType": "service",
        "layer":     "L7",
        "showUpDownRelatedNode": true,
        "showVirtualNode":       false
      }' | dc insight servicegraph get-graph --file -

      # Workload graph filtered by a specific service, with a 3-hop dependency depth
      echo '{
        "clusterNames": ["prod-1"],
        "namespaces":   ["default"],
        "services":     ["my-app"],
        "workloads":    ["my-app"],
        "start": "1700000000000",
        "end":   "1700003600000",
        "graphType": "workload",
        "filters": {
          "aggType": "p99",
          "dependencyMaxDepth": 3,
          "clauses": [
            {"field":"http.status_code","operation":"=","dataType":"string","stringValue":"500"}
          ]
        }
      }' | dc insight servicegraph get-graph --file -

  get-node-metrics:
    short: "Get aggregated metrics for a node (service/workload) on the topology graph"
    example: |
      # Last 30m of metrics for a single service node (endTime/lookback in unix ms)
      dc insight servicegraph get-node-metrics \
        --cluster-name prod-1 --namespace default --service my-app \
        --end-time 1700003600000 --lookback 1800000 \
        --step 60000 --rate-per 60000 \
        --span-kinds SPAN_KIND_SERVER -o json

      # With extension filters (label selectors)
      dc insight servicegraph get-node-metrics \
        --cluster-name prod-1 --namespace default --service my-app \
        --extension-filters 'skoala_registry=ire-111,instance=10.0.0.1' \
        --end-time 1700003600000 --lookback 1800000 --step 60000

  # ── 事件 (Event) ──────────────────────────────────────────────────────
  # 所有 startTime / endTime / timestamp 均为 RFC3339 字符串（如 2024-06-24T08:00:00Z）
  query-events:
    short: "Query K8s events of a cluster with filters and pagination"
    aliases: [ls-events]
    example: |
      # All Warning events in a namespace in the last hour
      dc insight event query-events \
        --cluster-name prod-1 --namespace default \
        --start-time 2024-06-24T07:00:00Z --end-time 2024-06-24T08:00:00Z \
        --filter.type Warning \
        --page 1 --page-size 50 -o json
      # Fuzzy search by reason + involved object + message
      dc insight event query-events \
        --cluster-name prod-1 --namespace default \
        --filter.reason FailedScheduling \
        --filter.involve-object-kind Pod \
        --filter.involve-object-name my-app \
        --filter.message 'insufficient memory' \
        --sort 'metadata.creationTimestamp:desc'
    params:
      page:        { default: "1" }
      pageSize:    { default: "20" }
      filter.type: { help: "TYPE_UNSPECIFIED | Normal | Warning" }

  query-event-context:
    short: "Fetch surrounding events around a specific timestamp (context view)"
    example: |
      # 20 events before and 20 after a specific timestamp
      dc insight event query-event-context \
        --cluster-name prod-1 --namespace default \
        --timestamp 2024-06-24T07:15:32.123456789Z \
        --filter.type Warning --filter.involve-object-kind Pod \
        --before 20 --after 20 -o json
    params:
      filter.type: { help: "TYPE_UNSPECIFIED | Normal | Warning" }

  query-event-count:
    short: "Aggregate event counts in a time range (POST body supports multiple filters)"
    example: |
      echo '{
        "namespace": "default",
        "startTime": "2024-06-24T07:00:00Z",
        "endTime":   "2024-06-24T08:00:00Z",
        "filters": [
          {"type":"Warning","involveObjectKind":"Pod","reason":"FailedScheduling"},
          {"type":"Warning","involveObjectKind":"Node"}
        ]
      }' | dc insight event query-event-count --cluster-name prod-1 --file -

  query-event-histogram:
    short: "Bucket event counts over time (normal vs warning)"
    example: |
      dc insight event query-event-histogram \
        --cluster-name prod-1 --namespace default \
        --start-time 2024-06-24T07:00:00Z --end-time 2024-06-24T08:00:00Z \
        --interval 60s -o json

  query-event-filter-options:
    short: "List available filter options (object kinds / reasons / etc.) for the event UI"
    example: |
      dc insight event query-event-filter-options \
        --cluster-name prod-1 --namespace default \
        --start-time 2024-06-24T07:00:00Z --end-time 2024-06-24T08:00:00Z

  get-reasons:
    short: "Get the predefined event reason vocabulary grouped by object kind"
    example: |
      dc insight event get-reasons
      dc insight event get-reasons -o json

  # ── 概览 (Overview) ───────────────────────────────────────────────────
  # time / start / end 单位为 unix 秒 (int64)
  get-resources-count:
    short: "Get global resource counts (clusters / nodes / pods / deployments) for the dashboard"
    example: |
      # All defaults
      dc insight overview get-resources-count
      # At a specific point in time, only cluster + node totals
      dc insight overview get-resources-count \
        --time 1700000000 \
        --filters CLUSTER_TOTAL --filters CLUSTER_NORMAL_TOTAL \
        --filters NODE_TOTAL --filters NODE_NORMAL_TOTAL -o json

  get-resources-range:
    short: "Get resource counts over a time range (sparkline data)"
    example: |
      # 1-hour range with 60s step
      dc insight overview get-resources-range \
        --start 1700000000 --end 1700003600 --step 60 \
        --filters NODE_TOTAL --filters POD_NORMAL_TOTAL --filters POD_ABNORMAL_TOTAL -o json

  get-resources-usage:
    short: "Get top-N resource usage time series (CPU / memory) for clusters or nodes"
    example: |
      # Top 5 nodes by CPU usage over the last hour
      dc insight overview get-resources-usage \
        --start 1700000000 --end 1700003600 --step 60 \
        --filters NODE_CPU_USAGE --limit 5 -o json
      # Cluster-level CPU usage
      dc insight overview get-resources-usage \
        --start 1700000000 --end 1700003600 --step 60 \
        --filters CLUSTER_CPU_USAGE --limit 10

  get-services-monitor:
    short: "Get a snapshot of service-level APM signals for the overview dashboard"
    example: |
      dc insight overview get-services-monitor \
        --time 1700003600 --limit 10 \
        --span-kinds SPAN_KIND_SERVER -o json

  # ── 拨测 (Probe) ──────────────────────────────────────────────────────
  list-probers:
    short: "List blackbox-exporter probers available in a cluster"
    aliases: [ls-probers]
    example: |
      dc insight probe list-probers --cluster-name prod-1
      dc insight probe list-probers --cluster-name prod-1 -o json

  list-probes:
    short: "List probes in a cluster + namespace"
    aliases: [ls-probes]
    example: |
      dc insight probe list-probes --cluster-name prod-1 --namespace insight-system
      dc insight probe list-probes --cluster-name prod-1 --namespace insight-system \
        --fuzzy-name web --sort 'metadata.creationTimestamp:desc' \
        --page 1 --page-size 50 -o json
    params:
      page:     { default: "1" }
      pageSize: { default: "20" }

  get-probe:
    short: "Get a probe by cluster + namespace + jobName"
    aliases: [describe-probe]
    example: |
      dc insight probe get-probe \
        --cluster-name prod-1 --namespace insight-system --job-name web-check

  add-probe:
    short: "Create a probe (PrometheusOperator Probe / blackbox-exporter)"
    example: |
      # HTTP 2xx probe against two URLs, scraped every 30s
      echo '{
        "probe": {
          "jobName":       "web-check",
          "module":        "http_2xx",
          "interval":      "30s",
          "scrapeTimeout": "10s",
          "prober": {
            "name":   "blackbox-exporter",
            "url":    "blackbox-exporter.insight-system.svc:9115",
            "scheme": "http",
            "path":   "/probe"
          },
          "targets": {
            "staticConfig": {
              "static": [
                "https://example.com",
                "https://api.example.com/health"
              ],
              "labels": {"team": "ops"}
            }
          }
        }
      }' | dc insight probe add-probe \
            --cluster-name prod-1 --namespace insight-system --file -

  update-probe:
    short: "Update a probe's interval / module / targets"
    example: |
      echo '{
        "interval": "60s",
        "scrapeTimeout": "15s",
        "module": "http_2xx",
        "targets": {
          "staticConfig": {
            "static": ["https://example.com","https://api.example.com/health"],
            "labels": {"team": "ops", "tier": "edge"}
          }
        }
      }' | dc insight probe update-probe \
            --cluster-name prod-1 --namespace insight-system --job-name web-check --file -

  delete-probe:
    short: "Delete a probe by cluster + namespace + jobName"
    example: |
      dc insight probe delete-probe \
        --cluster-name prod-1 --namespace insight-system --job-name web-check

  # ── 用户 (User) ───────────────────────────────────────────────────────
  # 注意：此 list-users 与 ghippo 的 list-users 不同，命令前缀是 `dc insight user`
  list-users:
    short: "List Insight users (Insight-side user view, not ghippo)"
    aliases: [ls-users]
    example: |
      dc insight user list-users
      # Fuzzy search by name + paged JSON output
      dc insight user list-users --search alice --page 1 --page-size 50 -o json
    params:
      page:     { default: "1" }
      pageSize: { default: "20" }

  # ── 功能开关 (FeatureGate) ────────────────────────────────────────────
  get-feature-gates:
    short: "List all Insight feature gates and their enabled status"
    aliases: [ls-feature-gates]
    example: |
      dc insight featuregate get-feature-gates
      dc insight featuregate get-feature-gates -o json

  get-feature-gate-by-id:
    short: "Get a single feature gate by ID"
    example: |
      # id must be one of:
      #   METRICS | LOGGING | TRACING | GRAPH_VIRTUAL_NODE
      #   LOG_ALERT | NET_FLOW | EVENT | SLOW_SQL
      dc insight featuregate get-feature-gate-by-id --id METRICS
      dc insight featuregate get-feature-gate-by-id --id SLOW_SQL -o json

  # ── 全局配置 (GlobalConfig) ───────────────────────────────────────────
  get-version:
    short: "Get Insight server version info"
    example: |
      dc insight insight get-version
      dc insight insight get-version -o json

  get-global-config:
    short: "Get Insight global configuration (retention, thresholds)"
    example: |
      dc insight insight get-global-config
      dc insight insight get-global-config -o json

  get-userinfo:
    short: "Get current user's Insight permissions and accessible resource types"
    example: |
      dc insight insight get-userinfo
      dc insight insight get-userinfo -o json

  update-global-config:
    short: "Update Insight global configuration (retention, thresholds)"
    example: |
      # Update retention windows and APM thresholds
      dc insight insight update-global-config \
        --set logRetentionTime=7d \
        --set k8sEventLogRetentionTime=7d \
        --set skoalaLogRetentionTime=7d \
        --set traceDataRetentionTime=15d \
        --set vmStorageRetentionTime=30d \
        --set alertHistoryRetentionTime=90 \
        --set traceApdexThreshold=500ms \
        --set slowSqlThreshold=1000 \
        --set-str 'latencyThresholds[0]=500' \
        --set-str 'latencyThresholds[1]=1000' \
        --set-str 'errorRateThresholds[0]=0.01' \
        --set-str 'errorRateThresholds[1]=0.05'

      # Or pass the full body via stdin
      echo '{
        "logRetentionTime": "7d",
        "k8sEventLogRetentionTime": "7d",
        "skoalaLogRetentionTime": "7d",
        "traceDataRetentionTime": "15d",
        "vmStorageRetentionTime": "30d",
        "alertHistoryRetentionTime": 90,
        "traceApdexThreshold": "500ms",
        "slowSqlThreshold": 1000,
        "latencyThresholds": [500, 1000],
        "errorRateThresholds": [0.01, 0.05]
      }' | dc insight insight update-global-config --file -

  get-helm-install-config:
    short: "Generate Helm install parameters for the Insight agent chart"
    example: |
      # Get install params for insight-agent chart
      dc insight insight get-helm-install-config \
        --set chartName=insight-agent \
        --set version=0.30.0

      # With extra overrides
      echo '{
        "chartName": "insight-agent",
        "version": "0.30.0",
        "extra": {
          "global.exporters.logging.enabled": true,
          "global.exporters.metrics.enabled": true
        }
      }' | dc insight insight get-helm-install-config --file -