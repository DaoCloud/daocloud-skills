  list-pods:
    short: "List pod report records"
    aliases: [ls-pods]
    example: |
      dce operations-management report list-pods --cluster <cluster> --namespace <namespace> --page 1 --page-size 20
      dce operations-management report list-pods --workspace <workspace> --search app -o json
    params:
      start: { help: "Start time for the report query window" }
      end: { help: "End time for the report query window" }
      page: { default: "1", help: "Page is current page." }
      pageSize: { default: "20", help: "Number of results per page" }
      search: { help: "Fuzzy search keyword" }
      workspace: { help: "Filter by workspace name or ID" }
